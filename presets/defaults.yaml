# Shared listing defaults for KLHAutographs.
#
# These values are applied to every listing and can be overridden
# per-product (in products.yaml) or per-listing (at lister call time).
# Values here were taken directly from Kim's live active listings —
# see tests/fixtures/ebay_samples/ for the raw GetItem payloads.
#
# Trading API semantic names are used (ConditionID, DispatchTimeMax,
# ReturnsAcceptedOption, …) so this file maps 1:1 onto AddFixedPriceItem.

marketplace:
  site: EBAY_GB
  country: GB
  currency: GBP
  location: "Manchester, Lancashire"
  postal_code: "M29 8DL"    # verified from all captured samples

# Kim's account is opted into eBay Business Policies (confirmed by
# SellerProfiles present on every captured GetItem sample). When
# policies are active, AddFixedPriceItem MUST reference profile IDs
# rather than inline ShippingDetails / ReturnPolicy. The shipping:
# and return_policy: sections below are kept as documentation only —
# the lister uses the IDs here to wire up each listing.
seller_profiles:
  payment_profile_id:  "226381763024"   # "eBay Managed Payments"
  return_profile_id:   "226381757024"   # "30 days"
  shipping_profile_id: "226588406024"   # "UK 2nd/T48/T24/SP"

listing:
  listing_type: FixedPriceItem
  listing_duration: GTC     # Good 'Til Cancelled
  condition_id: 1000        # 1000 = New (matches Kim's current A4 Photo listings)
  quantity: 1
  dispatch_time_max: 1      # days
  best_offer_enabled: false
  private_listing: false

# Free 2nd class with a paid next-day upgrade — lifted verbatim from the
# shipping service options on active listings.
shipping:
  type: Flat
  services:
    - service: UK_RoyalMailSecondClassStandard
      cost: 0.00
      free: true
      priority: 1
    - service: UK_RoyalMailSpecialDeliveryNextDay
      cost: 9.95
      priority: 2
  global_shipping: false    # Kim handles her own international

return_policy:
  returns_accepted: true
  within: Days_30
  shipping_cost_paid_by: Buyer
  refund_option: MoneyBack
  description: null

# Minimum Item Specifics applied to every listing. Per-product presets
# can add more and individual listings can add/override (e.g. Player,
# Team, Show Title, Movie Title, Sport, League).
#
# Two blocks here:
#
#   1. Required eBay specifics. These are the category-mandated fields
#      (Country of Origin, Signed, Original/Reproduction) that most of
#      Kim's autograph sub-categories insist on. Missing one is an
#      instant listing rejection.
#
#   2. Keyword-packed "Q&A-hack" specifics. These are CUSTOM names we
#      invented — eBay allows arbitrary specific names alongside the
#      required ones, and the values get indexed for keyword search
#      just like title words. By packing synonym-dense answers into
#      four custom specifics we cover the full "signed" vocabulary
#      (Signature, Autograph, Autographed, Hand Signed, Genuine, In
#      Person, Original, Authentic…) without eating title characters.
#
#      Bonus: these also act as a visible FAQ for buyers browsing the
#      item page — "Certificate Included: Free Certificate of
#      Authenticity COA Cert LOA Letter" answers the #1 question Kim
#      gets asked before anyone has to message her.
#
#      Char limits enforced: name ≤ 40 chars, value ≤ 65 chars. Values
#      below are all under the cap.
item_specifics:
  # Required — do not remove
  "Country of Origin":       "United Kingdom"
  "Signed":                  "Yes"
  "Original/Reproduction":   "Original"

  # Keyword-packed custom specifics (FAQ-style, SEO payload)
  "Authenticity Guarantee":  "100% Genuine Hand Signed Autograph Signature Original Authentic"
  "Certificate Included":    "Free Certificate of Authenticity COA Cert LOA Letter"
  "Autograph Type":          "Hand Signed In Person Original Autographed Not Copy Pre-Print"
  "Perfect For":             "Gift Present Memorabilia Collectible Mounted Framed Display"

# Description template (HTML). The body lives in description_template.html
# and is loaded alongside this file. The only required placeholder is
# {size_clause} — per-product presets fill that in.
description:
  template_file: description_template.html
  required_placeholders:
    - size_clause
