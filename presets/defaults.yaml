# Shared listing defaults for KLHAutographs.
#
# These values are applied to every listing and can be overridden
# per-product (in products.yaml) or per-listing (at lister call time).
# Values here were taken directly from Kim's live active listings —
# see tests/fixtures/ebay_samples/ for the raw GetItem payloads.
#
# Trading API semantic names are used (ConditionID, DispatchTimeMax,
# ReturnsAcceptedOption, …) so this file maps 1:1 onto AddFixedPriceItem.

marketplace:
  site: EBAY_GB
  country: GB
  currency: GBP
  location: "Manchester, Lancashire"
  postal_code: "M29 8DL"    # verified from all captured samples

# Kim's account is opted into eBay Business Policies (confirmed by
# SellerProfiles present on every captured GetItem sample). When
# policies are active, AddFixedPriceItem MUST reference profile IDs
# rather than inline ShippingDetails / ReturnPolicy. The shipping:
# and return_policy: sections below are kept as documentation only —
# the lister uses the IDs here to wire up each listing.
seller_profiles:
  payment_profile_id:  "226381763024"   # "eBay Managed Payments"
  return_profile_id:   "226381757024"   # "30 days"
  shipping_profile_id: "226588406024"   # "UK 2nd/T48/T24/SP"

listing:
  listing_type: FixedPriceItem
  listing_duration: GTC     # Good 'Til Cancelled
  condition_id: 1000        # 1000 = New (matches Kim's current A4 Photo listings)
  quantity: 1
  dispatch_time_max: 1      # days
  best_offer_enabled: false
  private_listing: false

# VAT rate (percent) applied to every listing via <VATDetails><VATPercent>.
# Kim is VAT-registered; the existing live listings all carry 20%. If
# HMRC changes the rate or Kim deregisters, flip the number (or remove
# the whole key to stop emitting VATDetails).
vat_percent: 20.0

# Free 2nd class with a paid next-day upgrade — lifted verbatim from the
# shipping service options on active listings.
shipping:
  type: Flat
  services:
    - service: UK_RoyalMailSecondClassStandard
      cost: 0.00
      free: true
      priority: 1
    - service: UK_RoyalMailSpecialDeliveryNextDay
      cost: 9.95
      priority: 2
  global_shipping: false    # Kim handles her own international

return_policy:
  returns_accepted: true
  within: Days_30
  shipping_cost_paid_by: Buyer
  refund_option: MoneyBack
  description: null

# Item Specifics applied to every listing.
#
# This block holds ONLY specifics that are truly generic — they apply
# to every single thing Kim sells, regardless of size, format, mount vs
# frame vs bare photo, sport vs music vs TV. Anything product-specific
# (Size, Format, Frame Style, Sport, Team, Show, Year Signed, Player)
# belongs in products.yaml per-product or on the per-listing call.
#
# Why the strict separation? "Product leak". If we put something like
# "Mounted Framed Display" in a shared default, a bare 10x8 photo
# listing inherits those words and becomes a small lie. Cassini indexes
# every item specific value for keyword search, so a product leak
# doesn't just confuse buyers — it actively drags the wrong listings
# into the wrong search results.
#
# Two groups below:
#
#   1. Required eBay specifics (Country of Origin, Signed,
#      Original/Reproduction). Category-mandated. Missing one is an
#      instant listing rejection.
#
#   2. Custom "Q&A" specifics. eBay allows arbitrary names alongside the
#      required ones and the values get indexed for keyword search just
#      like title words. By packing synonym-dense answers into five
#      custom specifics we cover the full "signed" vocabulary
#      (Signature, Autograph, Hand Signed, Genuine, In Person, …)
#      without eating title characters, AND we act as a visible FAQ
#      for buyers browsing the item page.
#
#      "COA Included" answers the #1 question Kim gets asked.
#      "More In Our Shop" is a cross-sell to Kim's full format range
#      without claiming the current item IS any of those formats.
#      "Also Known As" catches less-obvious search terms (merch,
#      print, poster, auto) that buyers type but we can't fit in
#      the title.
#
# Char limits enforced by eBay: name ≤ 40 chars, value ≤ 65 chars.
# A test (test_defaults_specifics_within_ebay_char_limits) locks this in.
item_specifics:
  # Required — do not remove
  "Country of Origin":     "United Kingdom"
  "Signed":                "Yes"
  "Original/Reproduction": "Original"

  # Custom Q&A specifics — generic only, NO product leak
  "Authenticity":          "100% Genuine Hand Signed Autograph Signature Original Authentic"
  "COA Included":          "Includes Certificate of Authenticity COA Cert LOA Letter"
  "Autograph Type":        "Hand Signed In Person Original Autographed Not Copy Pre-Print"
  "Perfect For":           "Gift Present Birthday Christmas Memorabilia Collectible Display"
  "More In Our Shop":      "Full Range In Store A4 10x8 12x8 16x12 Mount Frame Photo Card"
  "Also Known As":         "Merch Merchandise Print Poster Autographed Auto Signature Gift"

# Description template (HTML). The body lives in description_template.html
# and is loaded alongside this file. The only required placeholder is
# {size_clause} — per-product presets fill that in.
description:
  template_file: description_template.html
  required_placeholders:
    - size_clause
