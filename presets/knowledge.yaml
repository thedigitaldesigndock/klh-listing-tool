# Knowledge base for listing enrichment.
#
# When Nicky names a file `<Name>_<Field1>_<Category>_<Price>.jpg`,
# this file tells us:
#   1. What kind of thing Field1 is (club, band, show, nickname, …)
#      via the `categories` section keyed on `Category` (field 2).
#   2. Whether `Category` itself should appear in the title as a keyword
#      (Rugby yes, Football no — too common).
#   3. Which keywords to pack into Item Specifics for that category.
#   4. How to expand short club names to their full official form
#      (Man Utd → Manchester United) so both variants end up in IS.
#   5. Which klh preset subject/category to route the listing to.
#   6. Which eBay STORE category the listing goes into (Kim's custom
#      shop category tree — different from the site-wide category_id).
#      Fetched live via GetStore on 2026-04-15.
#
# Add rows as Nicky/Kim hit new ones. Missing entries fail open — the
# lister will still list, it just won't expand the alias.
#
# NOTE on store category overrides:
#   - odd_card listings route to "Signed White Cards" (85843959013)
#     regardless of the category's store_category_id. This is Kim's
#     convention — all odd-size signed cards live in one shop bucket.
#   - If no store_category_id is set and no override applies, the
#     listing lands in the top-level "Other" bucket (id "1").

# ── CATEGORIES ─────────────────────────────────────────────────────────
# Keyed on the Category field (field 2 of the filename stem).
#
# Schema per entry:
#   in_title          — bool. True → add category word to title if fits.
#                       False → title never mentions the category.
#   is_keywords       — string. Space-joined keywords to dump into the
#                       "Category Keywords" item specific.
#   field1_label      — string. Item-specific name for the club/band/
#                       show/nickname that lives in field 1.
#   subject           — klh subject slug (used for category_id lookup).
categories:
  # ── Sports ──
  Football:
    in_title: false        # common enough that every buyer category-browses
    is_keywords: "Football Soccer FIFA Premier League Champions"
    field1_label: Club
    subject: football_premier
    store_category_id: 1954551013   # Football Autographs

  Rugby:
    in_title: true         # niche, worth the title slot
    is_keywords: "Rugby Union League RFU Six Nations World Cup Premiership"
