# ═════════════════════════════════════════════════════════════════════
# ORIENTATION (+ SIZE) → TEMPLATE LOOKUP
#
# 10x8 uses simple orientation keys: "landscape" / "portrait".
# 16x12 CDEF uses compound keys: "{photo_size}_{orientation}" because
# the scan could be 10x8 or 12x8 in either orientation.
#
# The resolver tries compound key first (if photo_size is known),
# then falls back to plain orientation key. This keeps 10x8 working
# unchanged while CDEF gets the 2×2 routing it needs.
# ═════════════════════════════════════════════════════════════════════
variants:
  10x8_mount:
    landscape: 10x8-mount-land
    portrait:  10x8-mount-port
  10x8_frame:
    landscape: 10x8-frame-land
    portrait:  10x8-frame-port
  16x12_mount_cdef:
    12x8_landscape: 16x12-c-mount
    12x8_portrait:  16x12-d-mount
    10x8_landscape: 16x12-e-mount
    10x8_portrait:  16x12-f-mount
  16x12_frame_cdef:
    12x8_landscape: 16x12-c-frame
    12x8_portrait:  16x12-d-frame
    10x8_landscape: 16x12-e-frame
    10x8_portrait:  16x12-f-frame

# ═════════════════════════════════════════════════════════════════════
# DASHBOARD DISPLAY ORDER
#
# Tile order in the product grid. The dashboard shows mount/frame twins
# as a single tile with a toggle — only one product per layout is
# visible at a time. Photo-only tiles are always shown.
# ═════════════════════════════════════════════════════════════════════
dashboard_order:
  # Grouped by product family. Each group has a label shown as a
  # section header in the dashboard, and a list of layout keys.
  - label: "Other Products"
    layouts:
      - photo_6x4
      - photo_10x8
      - photo_12x8
      - odd_card
      - odd_photo
  - label: "10x8 / A4"
    layouts:
      - a4_a
      - a4_b
      - 10x8
  - label: "16x12"
    layouts:
      - 16x12_a
      - 16x12_b
      - 16x12_cdef

# ═════════════════════════════════════════════════════════════════════
# Category ID lookup by subject (Football / Music / Film etc).
# Category depends on the SUBJECT, not the product type, so it lives
# outside the per-product entries and gets resolved at list time via
# pipeline/presets.py:get_category_id(subject).
# ═════════════════════════════════════════════════════════════════════
#
# IDs discovered by scripts/discover_sport_categories.py which walks
# Kim's active listings and tallies the eBay PrimaryCategory each sport
# lands in (most-common wins). Re-run that script if eBay restructures
# its taxonomy or Kim starts listing new sports.
categories_by_subject:
  football_premier:   27290   # Football > Autographs > Signed Photos > Premiership Players
  football_retired:   97085   # Football > Autographs > Signed Photos > Retired Players
  football_england:   27290   # default football bucket
  cricket:            2853    # Cricket Autographs (4/5 live listings)
  formula_one:        2835    # Motorsport Autographs (3/5 live listings)
  boxing:             2830    # Boxing Autographs (3/5 live listings)
  golf:               1223    # Golf Autographs (4/5 live listings)
  rugby:              2839    # Rugby Union Autographs (4/5 live listings)
  rugby_league:       68369   # Rugby League Autographs (4/4 live listings)
  snooker:            2892    # Snooker Autographs (5/5 live listings)
  tennis:             430     # Tennis Autographs (5/5 live listings)
  darts:              2892    # Darts (2/2 live listings — shares bucket with snooker)
  nba:                35027   # Basketball Autographs (2/5 live listings)
  nfl:                69530   # American Football Autographs (1 sample — verify)
  mma:                2902    # MMA/UFC Autographs (3/5 live listings)
  music_pop:          178898  # Music > Music Memorabilia > Pop > Autographs
  music_rock:         2525    # Music > Music Memorabilia > Rock > Autographs (verify)
  film_tv:            2312    # Entertainment Memorabilia > Autographs (verify)
  default:            27290   # fall back to the most common category
