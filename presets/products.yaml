  # ── Odd Size Card ──────────────────────────────────────────────
  # Used for any signed card that isn't one of our standard sizes
  # (e.g. index cards, tickets, autograph slips). The compositor
  # picks the best-fit Kim Ruler background (templates/rulers/)
  # based on the scan's detected content size.
  odd_card:
    button_label: "Odd Size Card"
    layout: odd_card
    frame: false
    template_id: null            # uses pipeline/ruler_composite.py, not spec.yaml
    main_size: auto              # detected from scan
    needs_secondary: null
    orientation_lock: null
    extra_images_group: "All Other Products"
    title_pattern: "{name}{hand_prefix} Signed Card{team_suffix} Autograph"
    default_price_gbp: 6.99
    suggested_prices: [6.99, 7.99, 9.99, 12.99]
