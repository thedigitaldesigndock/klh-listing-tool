  # ── Odd Size Photo ─────────────────────────────────────────────
  # For signed photos that don't fit the 6x4 / 10x8 / 12x8 slots.
  # Same ruler-background compositor as odd_card, different copy.
  odd_photo:
    button_label: "Odd Size Photo"
    layout: odd_photo
    frame: false
    template_id: null
    main_size: auto
    needs_secondary: null
    orientation_lock: null
