# Per-product listing presets for KLHAutographs.
#
# Each product defines the difference from defaults.yaml: title pattern,
# default price, description size_clause, and — for mockup-generating
# products — the klh-listing-tool template ID that composites the
# mockup image.
#
# TITLE STRATEGY (revised, see conversation notes)
# ------------------------------------------------
# Only two things change between listings: the signer's {name} and —
# very rarely — an optional {qualifier_suffix}. Everything else is
# keyword-packed boilerplate tuned for eBay search:
#
#   * "Signed" + "Autograph" + "Hand Signed" (where room allows) cover
#     the three distinct buyer searches for authenticity terms.
#   * "Photo" is in every title — it's the single biggest buyer-search
#     term for signed memorabilia on eBay UK.
#   * "Memorabilia" hits the category-browse long-tail.
#   * "Mount Display" / "Framed Photo Display" is the product term
#     (already matches Kim's existing bestsellers).
#   * "+COA" is in every title because Kim likes it there; the synonyms
#     (Cert / LOA / Letter of Authorisation / Certificate) live in the
#     Q&A-hack item specifics in defaults.yaml rather than eating title
#     characters.
#   * Team / show / film / sport is NOT in the title — it goes into
#     item specifics (Team, Show Title, Movie Title, Sport etc.). This
#     frees 10-20 chars per title for better keywords without losing
#     any findability (eBay indexes both sources).
#
# Title patterns use {name} for the signed personality and
# {qualifier_suffix} for an optional tag-on phrase (rarely used now
# that team/show moved to item specifics). Trailing "{qualifier_suffix}"
# inserts nothing when qualifier is empty.
#
# Max safe name length per product is the remainder after subtracting
# fixed boilerplate from eBay's 80-char cap. Budgets are commented
# per-product; names longer than the budget raise a ListerError.
#
# `template_id` is null for plain photos (no Pillow compositing needed —
# the scan IS the listing image). When set, the value must match a
# folder under templates/ (e.g. `a4-a-mount`, `16x12-a-mount`).
#
# Evidence files: tests/fixtures/ebay_samples/<product_key>.json

products:

  # ── Plain photos ─────────────────────────────────────────────────────
  a4_photo:
    template_id: null
    title_pattern: "{name} Signed A4 Photo{qualifier_suffix} Autograph Memorabilia Gift +COA"
    default_price_gbp: 29.99
    size_clause: "an A4 (297mm x 210mm / 11.7in x 8.3in) Photograph Display."
    # Boilerplate 54 chars → name budget 26
    # Evidence: Tim Allen Signed A4 Photo (item 267361288052)

  10x8_photo:
    template_id: null
    title_pattern: "{name} Signed 10x8 Photo{qualifier_suffix} Autograph Memorabilia Display +COA"
    default_price_gbp: 19.99
    size_clause: "a Signed 10x8 Inch (254mm x 203mm) Photograph."
    # Boilerplate 62 chars → name budget 18
    # Evidence: Mel C / Alex Stepney Signed 10x8 Photo

  12x8_photo:
    template_id: null
    title_pattern: "{name} Signed 12x8 Photo{qualifier_suffix} Autograph Memorabilia Display +COA"
    default_price_gbp: 19.99
    size_clause: "a Signed 12x8 Inch (30cm x 20cm) Photograph."
    # Boilerplate 62 chars → name budget 18
    # Evidence: Mike Doyle Signed 12x8 Photo (item 257059745434)

  6x4_photo:
    template_id: null
    title_pattern: "{name} Hand Signed 6x4 Photo{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 17.99
    size_clause: "a Signed 6x4 Inch Photograph."
    # Boilerplate 55 chars → name budget 25
    # Evidence: Dan Castellaneta Signed 6x4 Photo (item 257101644712)

  # ── Mount displays (Pillow-composited from template + picture + card) ─
  a4_mount:
    # A4-A Mount is the default variant; use a4-b-mount when available.
    template_id: a4-a-mount
    title_pattern: "{name} Signed A4 Photo Mount Display{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 39.99
    size_clause: "an A4 Mount Display. The overall size of the piece is A4 (297mm x 210mm / 11.7in x 8.3in)."
    # Boilerplate 63 chars → name budget 17
    # Note: No active a4_mount listings found in first 2,000 — template
    # exists but the product may be new/aspirational. Verify pricing.

  10x8_mount:
    template_id: 10x8-mount-land   # default to landscape; override per listing
    title_pattern: "{name} Signed 10x8 Photo Mount Display{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 29.99
    size_clause: "a 10x8 Inch Mount Display. The overall size of the piece is approx 12x10 Inches."
    # Boilerplate 65 chars → name budget 15
    # Note: No active 10x8_mount listings found. Pricing guessed
    # between 10x8_photo (£19.99) and 16x12_mount (£54.99).

  16x12_mount:
    # Six variants A-F; default to 16x12-a-mount. Override via
    # template_id override when listing from a specific variant.
    template_id: 16x12-a-mount
    title_pattern: "{name} Signed 16x12 Photo Mount Display{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 54.99
    size_clause: "a Genuine Hand Signed Large 16x12 Inch Photograph Display. The overall size of the piece is 16x12 Inches (40x30cm)."
    # Boilerplate 66 chars → name budget 14
    # Evidence: Alan Hansen 16x12 Mount Display (item 267507152141)

  # ── Framed photo displays ────────────────────────────────────────────
  a4_frame:
    template_id: a4-a-frame
    title_pattern: "{name} Signed A4 Framed Photo Display{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 119.99
    size_clause: "an A4 (297mm x 210mm / 11.7in x 8.3in) Framed Photograph Display."
    # Boilerplate 64 chars → name budget 16
    # Evidence: Debbie Harry A4 Framed Photo (item 257301958734)

  10x8_frame:
    template_id: 10x8-frame-land    # default landscape; override per listing
    title_pattern: "{name} Signed 10x8 Framed Photo Display{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 54.99
    size_clause: "a 10x8 Inch (254mm x 203mm) Framed Photograph Display."
    # Boilerplate 66 chars → name budget 14
    # Evidence: Stuart Pearce 10x8 Framed Photo Display (item 257200816663)

  16x12_frame:
    template_id: 16x12-a-frame
    title_pattern: "{name} Signed 16x12 Framed Photo Display{qualifier_suffix} Autograph Memorabilia +COA"
    default_price_gbp: 149.99
    size_clause: "a 16x12 Inch (40.6cm x 30.5cm / 406mm x 305mm) Framed Photograph Display."
    # Boilerplate 67 chars → name budget 13
    # Evidence: Steve Bruce & Bryan Robson 16x12 Framed Photo (item 257301959210)

# ── Orientation / variant resolution hints ─────────────────────────────
#
# Several product types have multiple physical templates (10x8 Land vs
# Port, 16x12 A-F). The picker logic for choosing which specific
# template to use — based on input photo aspect ratio or a manual
# override — lives in pipeline/presets.py, not here.
variants:
  10x8_mount:
    landscape: 10x8-mount-land
    portrait:  10x8-mount-port
  10x8_frame:
    landscape: 10x8-frame-land
    portrait:  10x8-frame-port
  16x12_mount:
    # No automatic aspect-based pick — the A-F variants are design
    # variations, not orientation. Default to A unless overridden.
    default:  16x12-a-mount
    variants: [16x12-a-mount, 16x12-b-mount, 16x12-c-mount,
               16x12-d-mount, 16x12-e-mount, 16x12-f-mount]
  16x12_frame:
    default:  16x12-a-frame
    variants: [16x12-a-frame, 16x12-b-frame, 16x12-c-frame,
               16x12-d-frame, 16x12-e-frame, 16x12-f-frame]

# ── Category ID notes ──────────────────────────────────────────────────
#
# Categories depend on the SUBJECT (football/music/film/TV), NOT the
# product type, so we don't bake a category per product here. Instead
# pipeline/presets.py exposes get_category(sport) using this lookup:
categories_by_subject:
  football_premier:   27290   # Sports > Football > Autographs > Signed Photos > Premiership Players
  football_retired:   97085   # Sports > Football > Autographs > Signed Photos > Retired Players
  football_england:   27290   # default football bucket
  cricket:            78301   # Sports > Cricket > Autographs (verify)
  formula_one:        2872    # Sports > Motorsports > F1 > Autographs (verify)
  music_pop:          178898  # Music > Music Memorabilia > Pop > Autographs
  music_rock:         2525    # Music > Music Memorabilia > Rock > Autographs (verify)
  film_tv:            2312    # Entertainment Memorabilia > Autographs (verify)
  default:            27290   # fall back to the most common category
