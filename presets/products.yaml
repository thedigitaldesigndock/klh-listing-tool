  # ── Layout: 16x12_cdef  (single photo, auto size + orientation) ─────
  #
  # Merges the old C/D/E/F layouts into one tile. The system detects
  # the scan's photo size (10x8 vs 12x8) and orientation (land/port)
  # from pixel dimensions and routes to the correct template:
  #   12x8 landscape → 16x12-c-mount/frame
  #   12x8 portrait  → 16x12-d-mount/frame
  #   10x8 landscape → 16x12-e-mount/frame
  #   10x8 portrait  → 16x12-f-mount/frame
  #
  # Aspect ratios are distinct (1.5, 0.67, 1.25, 0.8) so there's
  # zero ambiguity. Nicky just picks the tile, scans a mixed batch,
  # and the system figures it all out.
  16x12_mount_cdef:
    button_label: "16x12-C/D/E/F (Mount)"
    layout: 16x12_cdef
    frame: false
    template_id: 16x12-c-mount   # default; overridden by variants at list time
    main_size: auto               # detected from scan dimensions
    needs_secondary: null
    orientation_lock: auto
    extra_images_group: "16x12 Mount"
    title_pattern: "{name}{hand_prefix} Signed 16x12 Photo Mount Display{team_suffix} Autograph"
