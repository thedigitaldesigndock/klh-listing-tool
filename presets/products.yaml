# Per-product listing presets for KLHAutographs.
#
# This file is the single source of truth for the dashboard product
# grid, the CLI lister, and the mockup compositor. Each entry below is
# one clickable tile in the dashboard.
#
# ── Layout groups ────────────────────────────────────────────────────
# 6 mockup layouts each have a Mount and a Frame variant. The
# dashboard shows 6 tiles with a top-of-page Mount/Frame segmented
# control that swaps each tile between its mount and frame twin. The
# 4 photo-only products are always-visible fixed tiles.
#
# The old C/D/E/F (4 separate layouts × 2 = 8 products) are now
# merged into a single "CDEF" layout (1 layout × 2 = 2 products).
# The system auto-detects photo size (10x8 vs 12x8) and orientation
# (landscape vs portrait) from scan dimensions and routes to the
# correct template via the variants block.
#
# Total products: 17.
#   6 mount layouts × 2 (mount + frame)                 = 12
#   3 plain-photo tiles (6x4, 10x8, 12x8)               =  3
#   2 odd-size tiles (card, photo) using ruler backgrounds = 2
#                                                        ───
#                                                         17
#
# The `layout` field groups each mount with its frame twin. Two entries
# with the same `layout` are the mount/frame pair for a single dashboard
# tile — one will have `frame: false`, the other `frame: true`.
#
# ── Secondary slot ───────────────────────────────────────────────────
# `needs_secondary` tells the matcher and dashboard what (if anything)
# goes in the TWO/ folder:
#   - null   : TWO/ is empty for this product (single-photo layouts)
#   - card   : TWO/ holds a signed card scan (A-variants)
#   - photo  : TWO/ holds a second photo scan (B-variants)
# The compositor doesn't care which it is — it slots whatever's in TWO/
# into the secondary bbox from spec.yaml. The distinction is for
# dashboard UI hints and validation.
#
# ── Orientation lock ─────────────────────────────────────────────────
# `orientation_lock` forces a main-photo orientation check at list time:
#   - null       : either orientation accepted
#   - landscape  : w > h; reject portrait scans with a clear error
#   - portrait   : h > w; reject landscape scans
#   - auto       : auto-pick a variant template based on aspect ratio
#                  (used by 10x8 mount/frame to swap between land/port
#                  internal templates without showing Nicky a choice)
#
# ── Title strategy ───────────────────────────────────────────────────
# `{name}` is the signer. `{team_suffix}` is filled in by presets.py
# at render time from the filename's Field1 value — only inserted if
# knowledge.yaml says the club/sport/show should appear in the title
# AND the total title length stays ≤ 80 chars. If either check fails,
# team_suffix renders as empty and the club/show drops into item
# specifics instead.
#
# ── Suggested prices ─────────────────────────────────────────────────
# `suggested_prices` is a short list of common prices for that product
# family, shown as quick-pick chips next to each mockup's price input
# in the dashboard. `default_price_gbp` is the chip that's pre-selected.
# Nicky can always type any price he wants.
#
# Source: computed from Kim's 13,840 live eBay listings in audit.db
# (2026-04-11). Floor ≈ P10, default ≈ P10, chips span P10–P75.
# Mounts have no prior inventory so default = a4_photo floor + surcharge.

